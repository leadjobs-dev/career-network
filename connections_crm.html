<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connections CRM</title>
<style>
/* ── CSS Variables (light default) ── */
:root {
  --bg:          #f8fafc;
  --surface:     #ffffff;
  --surface2:    #f8fafc;
  --border:      #e8ecf0;
  --border2:     #f1f5f9;
  --text:        #0f172a;
  --text2:       #475569;
  --text3:       #94a3b8;
  --topbar-bg:   #ffffff;
  --topbar-border: #e8ecf0;
  --tab-bg:      transparent;
  --tab-border:  #e2e8f0;
  --tab-color:   #64748b;
  --tab-hover-bg:#f1f5f9;
  --tab-active-bg:#0f172a;
  --tab-active-color:#ffffff;
  --tab-count-bg:#f1f5f9;
  --tab-count-color:#64748b;
  --tab-active-count-bg:rgba(255,255,255,0.2);
  --tab-active-count-color:#fff;
  --search-bg:   #f1f5f9;
  --search-border:#e2e8f0;
  --search-color:#0f172a;
  --search-ph:   #94a3b8;
  --filter-bg:   #ffffff;
  --ftag-bg:     #ffffff;
  --ftag-border: #e2e8f0;
  --ftag-color:  #64748b;
  --ftag-hover-bg:#f8fafc;
  --th-bg:       #f8fafc;
  --th-color:    #94a3b8;
  --th-hover-bg: #f1f5f9;
  --th-hover-color:#475569;
  --row-border:  #f1f5f9;
  --row-hover:   #f8fafc;
  --row-expand:  #f0f7ff;
  --expand-bg:   #f8fafc;
  --expand-border:#e2e8f0;
  --seg-color:   #94a3b8;
  --seg-hover:   #f1f5f9;
  --seg-hover-color:#475569;
  --pill-bg:     #ffffff;
  --pill-border: #e2e8f0;
  --input-bg:    #ffffff;
  --input-border:#e2e8f0;
  --input-color: #374151;
  --dropdown-bg: #ffffff;
  --dropdown-border:#e5e7eb;
  --score-val:   #0f172a;
  --final-score: #0f172a;
  --rank-color:  #cbd5e1;
  --chev-color:  #cbd5e1;
  --save-color:  #94a3b8;
  --divider:     rgba(0,0,0,0.08);
}
[data-theme="dark"] {
  --bg:          #0f172a;
  --surface:     #1e293b;
  --surface2:    #162032;
  --border:      #334155;
  --border2:     #253347;
  --text:        #f1f5f9;
  --text2:       #94a3b8;
  --text3:       #475569;
  --topbar-bg:   #0f172a;
  --topbar-border:#1e293b;
  --tab-bg:      transparent;
  --tab-border:  rgba(255,255,255,0.1);
  --tab-color:   rgba(255,255,255,0.5);
  --tab-hover-bg:rgba(255,255,255,0.07);
  --tab-active-bg:#ffffff;
  --tab-active-color:#0f172a;
  --tab-count-bg:rgba(255,255,255,0.12);
  --tab-count-color:rgba(255,255,255,0.6);
  --tab-active-count-bg:#e2e8f0;
  --tab-active-count-color:#334155;
  --search-bg:   rgba(255,255,255,0.07);
  --search-border:rgba(255,255,255,0.12);
  --search-color:#f1f5f9;
  --search-ph:   rgba(255,255,255,0.3);
  --filter-bg:   #1e293b;
  --ftag-bg:     #1e293b;
  --ftag-border: #334155;
  --ftag-color:  #64748b;
  --ftag-hover-bg:#253347;
  --th-bg:       #162032;
  --th-color:    #475569;
  --th-hover-bg: #1e293b;
  --th-hover-color:#94a3b8;
  --row-border:  #1e293b;
  --row-hover:   #1e2d40;
  --row-expand:  #172338;
  --expand-bg:   #162032;
  --expand-border:#334155;
  --seg-color:   #475569;
  --seg-hover:   #253347;
  --seg-hover-color:#94a3b8;
  --pill-bg:     #253347;
  --pill-border: #334155;
  --input-bg:    #253347;
  --input-border:#334155;
  --input-color: #e2e8f0;
  --dropdown-bg: #1e293b;
  --dropdown-border:#334155;
  --score-val:   #f1f5f9;
  --final-score: #f1f5f9;
  --rank-color:  #334155;
  --chev-color:  #334155;
  --save-color:  #475569;
  --divider:     rgba(255,255,255,0.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); }

/* ── Topbar ── */
.topbar {
  position: sticky; top: 0; z-index: 100;
  background: var(--topbar-bg); border-bottom: 1px solid var(--topbar-border);
  padding: 0 16px; display: flex; align-items: center; gap: 12px;
  box-shadow: 0 1px 3px var(--divider); min-height: 52px;
}
.topbar h1 {
  font-size: 12px; font-weight: 700; color: var(--text3);
  flex-shrink: 0; letter-spacing: 0.8px; text-transform: uppercase;
}

/* ── Tabs ── */
.tabs { display: flex; gap: 3px; overflow-x: auto; flex: 1; min-width: 0; padding: 8px 0; }
.tabs::-webkit-scrollbar { height: 0; }
.tab-btn {
  padding: 5px 13px; border-radius: 7px;
  border: 1px solid var(--tab-border); background: var(--tab-bg);
  font-size: 12px; font-weight: 500; cursor: pointer;
  white-space: nowrap; transition: all 0.12s; color: var(--tab-color);
  display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.tab-btn:hover { background: var(--tab-hover-bg); color: var(--text); }
.tab-btn.active { background: var(--tab-active-bg); color: var(--tab-active-color); border-color: transparent; font-weight: 600; }
.tab-count {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--tab-count-bg); color: var(--tab-count-color); border-radius: 5px;
  font-size: 10px; padding: 1px 5px; font-weight: 600; min-width: 20px;
}
.tab-btn.active .tab-count { background: var(--tab-active-count-bg); color: var(--tab-active-count-color); }
.tab-divider { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; align-self: center; margin: 0 3px; }

/* ── Dark mode toggle ── */
.dark-toggle {
  flex-shrink: 0; width: 32px; height: 32px; border-radius: 8px;
  border: 1px solid var(--tab-border); background: var(--tab-bg);
  color: var(--text2); cursor: pointer; display: flex; align-items: center;
  justify-content: center; font-size: 15px; transition: all 0.12s;
}
.dark-toggle:hover { background: var(--tab-hover-bg); color: var(--text); }

.search {
  flex-shrink: 0; width: 200px;
  padding: 6px 12px; border: 1px solid var(--search-border); border-radius: 7px;
  font-size: 13px; background: var(--search-bg); color: var(--search-color);
}
.search::placeholder { color: var(--search-ph); }
.search:focus { outline: none; border-color: #2563eb; }
.save-status { font-size: 12px; color: var(--save-color); white-space: nowrap; flex-shrink: 0; }
.save-status.saving { color: #d97706; }
.save-status.saved  { color: #16a34a; }
.save-status.error  { color: #dc2626; }

/* ── Filter bars ── */
.filterbar {
  position: sticky; top: 52px; z-index: 99;
  background: var(--filter-bg); border-bottom: 1px solid var(--border);
  padding: 7px 16px; display: flex; flex-direction: column; gap: 4px;
}
.filter-row { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
.filter-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text3); min-width: 82px; }
.ftag {
  padding: 3px 10px; border-radius: 20px; border: 1px solid var(--ftag-border);
  background: var(--ftag-bg); font-size: 12px; cursor: pointer; white-space: nowrap;
  transition: all 0.12s; color: var(--ftag-color); font-weight: 500;
}
.ftag:hover { background: var(--ftag-hover-bg); color: var(--text); border-color: var(--text3); }
.ftag.sel { border-color: transparent; color: #fff; font-weight: 600; }

.ftag[data-dim="fam"].sel[data-v="all"]               { background: #334155; }
.ftag[data-dim="fam"].sel[data-v="not_familiar"]       { background: #6b7280; }
.ftag[data-dim="fam"].sel[data-v="somewhat_familiar"]  { background: #2563eb; }
.ftag[data-dim="fam"].sel[data-v="worked_together"]    { background: #7c3aed; }
.ftag[data-dim="fam"].sel[data-v="very_close"]         { background: #0891b2; }
.ftag[data-dim="rec"].sel[data-v="all"]                { background: #334155; }
.ftag[data-dim="rec"].sel[data-v="na"]                  { background: #6b7280; }
.ftag[data-dim="rec"].sel[data-v="would_not_recommend"] { background: #dc2626; }
.ftag[data-dim="rec"].sel[data-v="neutral"]             { background: #d97706; }
.ftag[data-dim="rec"].sel[data-v="would_work_with"]     { background: #16a34a; }
.ftag[data-dim="rec"].sel[data-v="strongly_recommend"]  { background: #4f46e5; }

.count-chip { display: inline-flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.15); border-radius: 6px; font-size: 10px; padding: 0 5px; margin-left: 3px; font-weight: 600; }
.vis-count { margin-left: auto; font-size: 12px; color: var(--text3); align-self: flex-end; padding-bottom: 2px; }

/* ── Table ── */
.table-wrap {
  margin: 14px 16px; border-radius: 10px; overflow: hidden;
  box-shadow: 0 1px 3px var(--divider); background: var(--surface);
  border: 1px solid var(--border);
}
table { width: 100%; border-collapse: collapse; }
thead th {
  text-align: left; padding: 9px 13px;
  font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.6px; color: var(--th-color);
  border-bottom: 1px solid var(--border2); background: var(--th-bg); white-space: nowrap;
}
th.score-col { text-align: center; }
th.sortable { cursor: pointer; user-select: none; }
th.sortable:hover { color: var(--th-hover-color); background: var(--th-hover-bg); }
th.sort-desc .sort-arrow::after { content: ' ↓'; color: #2563eb; }
th.sort-asc  .sort-arrow::after { content: ' ↑'; color: #2563eb; }
tr.data-row { cursor: pointer; border-bottom: 1px solid var(--row-border); transition: background 0.1s; }
tr.data-row:hover    { background: var(--row-hover); }
tr.data-row.expanded { background: var(--row-expand); }
td { padding: 10px 13px; font-size: 13px; vertical-align: middle; }

td.td-rank { font-size: 12px; font-weight: 600; color: var(--rank-color); width: 34px; text-align: center; }
td.td-name { min-width: 130px; }
.name-link { font-weight: 600; color: var(--text); text-decoration: none; font-size: 13.5px; }
.name-link:hover { color: #2563eb; }
td.td-pos .pos-main { color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; font-size: 13px; }
td.td-pos .pos-sub  { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 280px; margin-top: 1px; }
td.td-score { text-align: center; }
.score-pill {
  display: inline-flex; align-items: center; justify-content: center;
  width: 28px; height: 21px; border-radius: 5px; font-size: 12px; font-weight: 700;
}
.score-pill.hi  { background: #dcfce7; color: #15803d; }
.score-pill.mid { background: #fef9c3; color: #a16207; }
.score-pill.lo  { background: #fee2e2; color: #b91c1c; }
.final-score { font-size: 15px; font-weight: 800; color: var(--final-score); letter-spacing: -0.3px; }

td.td-loc { font-size: 12px; color: var(--text3); white-space: nowrap; }
td.td-fam, td.td-rec { white-space: nowrap; }
td.td-chev { width: 22px; color: var(--chev-color); text-align: center; font-size: 13px; user-select: none; }

/* ── Inline annotation selector ── */
.ann-seg { display: flex; gap: 2px; align-items: center; }
.ann-seg-btn {
  padding: 2px 7px; border-radius: 20px; font-size: 10.5px; font-weight: 500;
  cursor: pointer; user-select: none; border: 1px solid transparent;
  color: var(--seg-color); background: transparent; transition: all 0.1s; white-space: nowrap;
}
.ann-seg-btn:hover { background: var(--seg-hover); color: var(--seg-hover-color); }
.ann-seg-btn.active { font-weight: 700; }
.ann-seg-btn.fam-not_familiar.active      { background: #f3f4f6; color: #6b7280; }
.ann-seg-btn.fam-somewhat_familiar.active { background: #eff6ff; color: #2563eb; }
.ann-seg-btn.fam-worked_together.active   { background: #f5f3ff; color: #7c3aed; }
.ann-seg-btn.fam-very_close.active        { background: #ecfeff; color: #0891b2; }
.ann-seg-btn.rec-na.active                { background: #f3f4f6; color: #6b7280; }
.ann-seg-btn.rec-would_not_recommend.active { background: #fee2e2; color: #dc2626; }
.ann-seg-btn.rec-neutral.active           { background: #fef3c7; color: #d97706; }
.ann-seg-btn.rec-would_work_with.active   { background: #dcfce7; color: #16a34a; }
.ann-seg-btn.rec-strongly_recommend.active{ background: #ede9fe; color: #4f46e5; }
.ann-seg-locked { opacity: 0.22; cursor: default !important; }

/* legacy badges used in expand panel */
.fam-badge, .rec-badge { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 600; user-select: none; }

/* ── Badge dropdown ── */
.badge-dropdown {
  position: fixed; z-index: 2000;
  background: var(--dropdown-bg); border: 1px solid var(--dropdown-border); border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15); min-width: 175px; padding: 4px 0;
}
.bdi { padding: 6px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 8px; color: var(--text2); transition: background 0.08s; }
.bdi:hover { background: var(--row-hover); }
.bdi.bdi-active { font-weight: 700; color: var(--text); }
.bdi.bdi-locked { opacity: 0.35; cursor: default; }
.bdi-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.fam-badge.not_familiar      { background: #f3f4f6; color: #6b7280; }
.fam-badge.somewhat_familiar { background: #eff6ff; color: #2563eb; }
.fam-badge.worked_together   { background: #f5f3ff; color: #7c3aed; }
.fam-badge.very_close        { background: #ecfeff; color: #0891b2; }
.rec-badge.na                 { background: #f3f4f6; color: #6b7280; }
.rec-badge.would_not_recommend{ background: #fee2e2; color: #dc2626; }
.rec-badge.neutral            { background: #fef3c7; color: #d97706; }
.rec-badge.would_work_with    { background: #dcfce7; color: #16a34a; }
.rec-badge.strongly_recommend { background: #ede9fe; color: #4f46e5; }

/* ── Loading / empty ── */
.loading-row td { text-align: center; color: var(--text3); font-size: 14px; padding: 60px; }
.no-results { text-align: center; color: var(--text3); font-size: 14px; padding: 48px; }
.empty-state { text-align: center; padding: 80px 40px; color: var(--text3); }
.empty-state h2 { font-size: 18px; color: var(--text2); margin-bottom: 8px; }
.empty-state p  { font-size: 14px; line-height: 1.8; }

/* ── Expand panel ── */
tr.expand-row > td { padding: 0; border-bottom: 2px solid var(--expand-border); background: var(--expand-bg); }
.expand-panel { padding: 16px 20px 18px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.ep-col { display: flex; flex-direction: column; gap: 10px; }
.lbl { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text3); }
.pill-row { display: flex; gap: 4px; flex-wrap: wrap; }
.ann-pill {
  padding: 3px 10px; border-radius: 12px; border: 1px solid var(--pill-border);
  background: var(--pill-bg); font-size: 11px; cursor: pointer; transition: all 0.1s; color: var(--text2);
}
.ann-pill:hover { border-color: var(--text3); }
.ann-pill.active { border-color: transparent; color: #fff; }
.ann-pill[data-dim="fam"].active[data-v="not_familiar"]       { background: #6b7280; }
.ann-pill[data-dim="fam"].active[data-v="somewhat_familiar"]  { background: #2563eb; }
.ann-pill[data-dim="fam"].active[data-v="worked_together"]    { background: #7c3aed; }
.ann-pill[data-dim="fam"].active[data-v="very_close"]         { background: #0891b2; }
.ann-pill[data-dim="rec"].active[data-v="na"]                  { background: #6b7280; }
.ann-pill[data-dim="rec"].active[data-v="would_not_recommend"] { background: #dc2626; }
.ann-pill[data-dim="rec"].active[data-v="neutral"]             { background: #d97706; }
.ann-pill[data-dim="rec"].active[data-v="would_work_with"]     { background: #16a34a; }
.ann-pill[data-dim="rec"].active[data-v="strongly_recommend"]  { background: #4f46e5; }
.ann-pill.disabled { opacity: 0.35; cursor: default; pointer-events: none; }

.notes-box, .outcome-box {
  width: 100%; border: 1px solid var(--input-border); border-radius: 6px;
  padding: 6px 8px; font-size: 12px; font-family: inherit;
  resize: vertical; color: var(--input-color); background: var(--input-bg);
}
.notes-box { min-height: 60px; }
.outcome-box { min-height: 40px; }
.notes-box:focus, .outcome-box:focus { outline: none; border-color: #2563eb; }
.outreach-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.outreach-toggle { display: flex; align-items: center; gap: 5px; font-size: 12px; cursor: pointer; color: var(--text2); }
.date-input { padding: 3px 8px; border: 1px solid var(--input-border); border-radius: 5px; font-size: 12px; font-family: inherit; background: var(--input-bg); color: var(--input-color); }
.score-breakdown { display: flex; gap: 10px; flex-wrap: wrap; }
.score-item { text-align: center; }
.score-item .si-val { font-size: 20px; font-weight: 700; color: var(--score-val); }
.score-item .si-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.4px; margin-top: 1px; }
.reason-text { font-size: 12px; color: var(--text2); font-style: italic; line-height: 1.5; }
.all-pos { font-size: 12px; color: var(--text2); line-height: 1.7; }

/* ── Pagination ── */
.pager { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 12px 16px; border-top: 1px solid var(--border2); font-size: 13px; }
.pg-btn { padding: 5px 13px; border-radius: 6px; border: 1px solid var(--ftag-border); background: var(--ftag-bg); color: var(--text2); cursor: pointer; font-size: 13px; }
.pg-btn:disabled { opacity: 0.35; cursor: default; }
.pg-btn:not(:disabled):hover { background: var(--row-hover); }
.pg-info { color: var(--text3); }
</style>
</head>
<body>

<div class="topbar">
  <h1>Connections CRM</h1>
  <div class="tabs" id="tabs"></div>
  <input class="search" id="search" type="text" placeholder="Search...">
  <button class="dark-toggle" id="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">🌙</button>
  <span class="save-status" id="save-status">Loading...</span>
</div>

<div class="filterbar">
  <div class="filter-row">
    <span class="filter-label">Familiarity</span>
    <button class="ftag sel" data-dim="fam" data-v="all"               onclick="setFilter('fam','all')">All</button>
    <button class="ftag"     data-dim="fam" data-v="not_familiar"      onclick="setFilter('fam','not_familiar')">Not familiar</button>
    <button class="ftag"     data-dim="fam" data-v="somewhat_familiar" onclick="setFilter('fam','somewhat_familiar')">Somewhat familiar</button>
    <button class="ftag"     data-dim="fam" data-v="worked_together"   onclick="setFilter('fam','worked_together')">Worked together</button>
    <button class="ftag"     data-dim="fam" data-v="very_close"        onclick="setFilter('fam','very_close')">Very close</button>
    <span class="vis-count" id="vis-count"></span>
  </div>
  <div class="filter-row">
    <span class="filter-label">Recommendation</span>
    <button class="ftag sel" data-dim="rec" data-v="all"                 onclick="setFilter('rec','all')">All</button>
    <button class="ftag"     data-dim="rec" data-v="na"                  onclick="setFilter('rec','na')">N/A</button>
    <button class="ftag"     data-dim="rec" data-v="would_not_recommend" onclick="setFilter('rec','would_not_recommend')">Would not recommend</button>
    <button class="ftag"     data-dim="rec" data-v="neutral"             onclick="setFilter('rec','neutral')">Neutral</button>
    <button class="ftag"     data-dim="rec" data-v="would_work_with"     onclick="setFilter('rec','would_work_with')">Would work with</button>
    <button class="ftag"     data-dim="rec" data-v="strongly_recommend"  onclick="setFilter('rec','strongly_recommend')">Strongly recommend</button>
  </div>
</div>

<div class="table-wrap">
  <table>
    <thead id="thead-row"></thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="pager" id="pager"></div>
</div>

<script>
// ── Constants ────────────────────────────────────────────────────────────────
var FAM_LABELS = {
  not_familiar:      'Not familiar',
  somewhat_familiar: 'Somewhat familiar',
  worked_together:   'Worked together',
  very_close:        'Very close'
};
var REC_LABELS = {
  na:                  'N/A',
  would_not_recommend: 'Would not recommend',
  neutral:             'Neutral',
  would_work_with:     'Would work with',
  strongly_recommend:  'Strongly recommend'
};

// ── Sort order maps ───────────────────────────────────────────────────────────
var FAM_ORDER = { not_familiar: 0, somewhat_familiar: 1, worked_together: 2, very_close: 3 };
var REC_ORDER = { na: 0, would_not_recommend: 1, neutral: 2, would_work_with: 3, strongly_recommend: 4 };

// Short labels for inline segmented selector (hover title shows full label)
var FAM_SHORT = { not_familiar: 'N/A', somewhat_familiar: 'Some', worked_together: 'Worked', very_close: 'Close' };
var REC_SHORT = { na: 'N/A', would_not_recommend: 'No', neutral: 'Maybe', would_work_with: 'Yes', strongly_recommend: '★' };

// ── State ────────────────────────────────────────────────────────────────────
var tabs        = [];   // [{type, filename, label, count, data: null|[]}]
var activeIdx   = -1;
var ann         = {};   // shared across all tabs
var saveTimer   = null;
var famFilter   = 'all';
var recFilter   = 'all';
var activeSearch= '';
var currentPage = 1;
var PAGE_SIZE   = 50;
var expandedTr      = null;
var expandedDataRow = null;
var sortCol     = null;  // active sort column key
var sortDir     = 0;     // 0 = none, 1 = asc, 2 = desc
var expandedUrl     = null;

// ── Theme ────────────────────────────────────────────────────────────────────
(function() {
  var t = localStorage.getItem('crm-theme');
  if (t === 'dark') {
    document.documentElement.dataset.theme = 'dark';
    document.addEventListener('DOMContentLoaded', function() {
      var btn = document.getElementById('dark-toggle');
      if (btn) btn.textContent = '☀️';
    });
  }
})();

function toggleDark() {
  var isDark = document.documentElement.dataset.theme === 'dark';
  document.documentElement.dataset.theme = isDark ? '' : 'dark';
  localStorage.setItem('crm-theme', isDark ? '' : 'dark');
  var btn = document.getElementById('dark-toggle');
  if (btn) btn.textContent = isDark ? '🌙' : '☀️';
}

// ── Boot ─────────────────────────────────────────────────────────────────────
Promise.all([
  fetch('/manifest').then(function(r) { return r.json(); }),
  fetch('/annotations').then(function(r) { return r.json(); }).catch(function() { return {}; })
]).then(function(results) {
  var manifest    = results[0];
  var annotations = results[1];
  ann = annotations;
  setStatus('', '');

  (manifest.network || []).forEach(function(f) {
    tabs.push({ type: 'network', filename: f.filename, label: f.label, count: f.count, data: null });
  });
  (manifest.roles || []).forEach(function(f) {
    tabs.push({ type: 'role', filename: f.filename, label: f.label, count: f.count, data: null });
  });

  if (tabs.length === 0) {
    document.getElementById('tbody').innerHTML =
      '<tr><td colspan="10"><div class="empty-state">' +
      '<h2>No data files found</h2>' +
      '<p>Drop <strong>enriched_*.json</strong> or <strong>ranked_*.json</strong> files<br>' +
      'into the same folder as crm_server.py, then refresh.</p>' +
      '</div></td></tr>';
    setStatus('No files', 'error');
    return;
  }

  buildTabs();
  activateTab(0);
}).catch(function() {
  setStatus('Server not responding', 'error');
});

// ── Tabs ─────────────────────────────────────────────────────────────────────
function buildTabs() {
  var el = document.getElementById('tabs');
  el.innerHTML = '';
  var lastType = null;
  tabs.forEach(function(tab, idx) {
    if (lastType === 'network' && tab.type === 'role') {
      var div = document.createElement('div');
      div.className = 'tab-divider';
      el.appendChild(div);
    }
    lastType = tab.type;
    var btn = document.createElement('button');
    btn.className = 'tab-btn' + (idx === activeIdx ? ' active' : '');
    btn.textContent = tab.label;
    if (tab.count) {
      var chip = document.createElement('span');
      chip.className = 'tab-count';
      chip.textContent = tab.count;
      btn.appendChild(chip);
    }
    btn.onclick = (function(i) { return function() { activateTab(i); }; })(idx);
    el.appendChild(btn);
  });
}

function activateTab(idx) {
  activeIdx    = idx;
  famFilter    = 'all';
  recFilter    = 'all';
  activeSearch = '';
  currentPage  = 1;
  sortCol      = null;
  sortDir      = 0;
  document.getElementById('search').value = '';
  document.querySelectorAll('.ftag').forEach(function(b) {
    b.classList.toggle('sel', b.dataset.v === 'all');
  });
  buildTabs();

  var tab = tabs[idx];
  if (tab.data) { updateHeader(tab.type); renderPage(); return; }

  document.getElementById('tbody').innerHTML =
    '<tr class="loading-row"><td colspan="10">Loading ' + esc(tab.label) + '…</td></tr>';
  document.getElementById('pager').innerHTML = '';
  setStatus('Loading…', 'saving');

  fetch('/data/' + tab.filename)
    .then(function(r) { return r.json(); })
    .then(function(raw) {
      tab.data = raw.map(normalizeConn);
      if (tab.type === 'role' && tab.data.length && tab.data[0]._role_name) {
        tab.label = tab.data[0]._role_name;
        buildTabs();
      }
      setStatus('', '');
      updateHeader(tab.type);
      renderPage();
    })
    .catch(function() { setStatus('Failed to load ' + tab.filename, 'error'); });
}

// ── Normalization ─────────────────────────────────────────────────────────────
function slimPos(p) {
  if (!p) return null;
  if (typeof p === 'string') return p.trim() || null;
  var title   = p.title || p.position || '';
  var company = p.companyName || p.company || '';
  var dur     = p.duration || '';
  var parts   = [];
  if (title && company) parts.push(title + ' at ' + company);
  else if (title)       parts.push(title);
  else if (company)     parts.push(company);
  if (dur) parts.push('(' + dur + ')');
  return parts.join(' ').trim() || null;
}
function slimList(lst, limit) {
  var result = [];
  (lst || []).slice(0, limit || 8).forEach(function(p) {
    var s = slimPos(p);
    if (s) result.push(s);
  });
  return result;
}
function normalizeConn(c) {
  var url = c.url || c.linkedinUrl || '';
  if (!url && c.originalQuery) {
    var oq = c.originalQuery;
    url = (typeof oq === 'object' ? (oq.query || '') : (oq || ''));
  }
  c.url             = (url || '').replace(/\/$/, '');
  c.currentPosition = slimList(c.currentPosition || c.positions, 3);
  c.experience      = slimList(c.experience, 8);
  c._days_connected = c._days_connected || c.days_connected || 0;
  c._name           = c.name || ((c.firstName || '') + ' ' + (c.lastName || '')).trim();
  return c;
}

// ── Header + Sort ─────────────────────────────────────────────────────────────
function thSort(label, col, extraClass, tip) {
  var cls = 'sortable' + (extraClass ? ' ' + extraClass : '');
  if (sortCol === col) cls += sortDir === 1 ? ' sort-asc' : ' sort-desc';
  return '<th class="' + cls + '" onclick="sortBy(\'' + col + '\')"' + (tip ? ' title="' + tip + '"' : '') + '>' +
         '<span class="sort-arrow">' + label + '</span></th>';
}
function thStatic(label, extraClass, tip) {
  return '<th' + (extraClass ? ' class="' + extraClass + '"' : '') + (tip ? ' title="' + tip + '"' : '') + '>' + label + '</th>';
}

function updateHeader(type) {
  var thead = document.getElementById('thead-row');
  if (type === 'role') {
    thead.innerHTML = '<tr>' +
      thStatic('#', 'score-col') +
      thSort('Name',        'name') +
      thStatic('Position') +
      thSort('Score',  'score', 'score-col', 'Final score = LLM score × 75% + Relationship bonus × 25%') +
      thSort('Req.',   'req',   'score-col', 'Requirements match: how well this person has the specific skills & qualifications the role needs (1–10)') +
      thSort('Senior.','senior','score-col', 'Seniority fit: are they at the right level? Too junior and too senior both score low (1–10)') +
      thSort('Domain', 'domain','score-col', 'Domain fit: have they worked in a similar industry or built similar products? (1–10)') +
      thSort('Familiarity', 'fam') +
      thSort('Recommendation','rec') +
      thStatic('') +
      '</tr>';
  } else {
    thead.innerHTML = '<tr>' +
      thSort('Name',          'name') +
      thStatic('Position') +
      thStatic('Location') +
      thSort('Familiarity',   'fam') +
      thSort('Recommendation','rec') +
      thStatic('') +
      '</tr>';
  }
}

function sortBy(col) {
  if (sortCol !== col) {
    sortCol = col; sortDir = 2;          // first click → descending
  } else if (sortDir === 2) {
    sortDir = 1;                         // second click → ascending
  } else {
    sortCol = null; sortDir = 0;         // third click → reset
  }
  currentPage = 1;
  var tab = tabs[activeIdx];
  if (tab) updateHeader(tab.type);
  renderPage();
}

function getSortVal(c, col) {
  var a = getAnn(c.url);
  switch (col) {
    case 'name':   return (c._name || '').toLowerCase();
    case 'score':  return c.final_score        || 0;
    case 'req':    return c.requirements_match || 0;
    case 'senior': return c.seniority_fit      || 0;
    case 'domain': return c.domain_fit         || 0;
    case 'fam':    return FAM_ORDER[a.familiarity    || 'not_familiar'] || 0;
    case 'rec':    return REC_ORDER[a.recommendation || 'na']          || 0;
    default:       return 0;
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return (s || '').toString()
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function scoreCls(v) { return v >= 7 ? 'hi' : v >= 4 ? 'mid' : 'lo'; }
function getAnn(url) {
  return ann[url] || { familiarity: 'not_familiar', recommendation: 'na', notes: '', outreach: {} };
}
function ensureAnn(url) {
  if (!ann[url]) ann[url] = { familiarity: 'not_familiar', recommendation: 'na', notes: '', outreach: { reached_out: false, date: '', outcome: '' } };
  return ann[url];
}
function setStatus(msg, cls) {
  var el = document.getElementById('save-status');
  el.textContent = msg;
  el.className = 'save-status' + (cls ? ' ' + cls : '');
}

// ── Filter + search + sort ────────────────────────────────────────────────────
function getFiltered() {
  var tab = tabs[activeIdx];
  if (!tab || !tab.data) return [];
  var q = activeSearch.toLowerCase();
  var result = tab.data.filter(function(c) {
    var a = getAnn(c.url);
    if (famFilter !== 'all' && a.familiarity    !== famFilter) return false;
    if (recFilter !== 'all' && a.recommendation !== recFilter) return false;
    if (!q) return true;
    var hay = (c._name + ' ' + (c.headline || '') + ' ' +
               (c.currentPosition || []).join(' ') + ' ' +
               (c.experience || []).join(' ')).toLowerCase();
    return hay.indexOf(q) !== -1;
  });
  if (sortCol && sortDir) {
    result = result.slice().sort(function(a, b) {
      var av = getSortVal(a, sortCol), bv = getSortVal(b, sortCol);
      var cmp = av < bv ? -1 : av > bv ? 1 : 0;
      return sortDir === 2 ? -cmp : cmp;
    });
  }
  return result;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderPage() {
  closeExpand();
  var tab      = tabs[activeIdx];
  var filtered = getFiltered();
  var total    = filtered.length;
  var pages    = Math.max(1, Math.ceil(total / PAGE_SIZE));
  if (currentPage > pages) currentPage = 1;
  var slice    = filtered.slice((currentPage-1)*PAGE_SIZE, currentPage*PAGE_SIZE);
  var type     = tab ? tab.type : 'network';

  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  if (total === 0) {
    tbody.innerHTML = '<tr><td colspan="10" class="no-results">No connections match.</td></tr>';
  } else {
    var frag = document.createDocumentFragment();
    slice.forEach(function(c, idx) {
      var url = c.url;
      var a   = getAnn(url);
      var pos = (c.currentPosition || []).concat(c.experience || []).filter(Boolean);
      var fam = a.familiarity    || 'not_familiar';
      var rec = a.recommendation || 'na';

      var tr = document.createElement('tr');
      tr.className = 'data-row';
      tr.dataset.url = url;

      var nameCell = url
        ? '<a class="name-link" href="' + esc(url) + '" target="_blank" onclick="event.stopPropagation()">' + esc(c._name) + '</a>'
        : esc(c._name);
      var posCell =
        (pos[0] ? '<div class="pos-main">' + esc(pos[0]) + '</div>' : '') +
        (pos[1] ? '<div class="pos-sub">'  + esc(pos[1]) + '</div>' : '');
      var famCell = '<div class="ann-seg">' + Object.keys(FAM_LABELS).map(function(v) {
        var locked = false;
        return '<span class="ann-seg-btn fam-' + v + (fam === v ? ' active' : '') + '" ' +
               'onclick="event.stopPropagation();segPick(\'' + esc(url) + '\',\'fam\',\'' + v + '\')" ' +
               'title="' + esc(FAM_LABELS[v]) + '">' + FAM_SHORT[v] + '</span>';
      }).join('') + '</div>';
      var locked_rec = fam === 'not_familiar';
      var recCell = '<div class="ann-seg">' + Object.keys(REC_LABELS).map(function(v) {
        var isLocked = locked_rec && v !== 'na';
        return '<span class="ann-seg-btn rec-' + v + (rec === v ? ' active' : '') + (isLocked ? ' ann-seg-locked' : '') + '" ' +
               (isLocked ? '' : 'onclick="event.stopPropagation();segPick(\'' + esc(url) + '\',\'rec\',\'' + v + '\')" ') +
               'title="' + esc(REC_LABELS[v]) + '">' + REC_SHORT[v] + '</span>';
      }).join('') + '</div>';

      var cells = '';
      if (type === 'role') {
        var rank = (currentPage-1)*PAGE_SIZE + idx + 1;
        var fs   = c.final_score        || 0;
        var rm   = c.requirements_match || 0;
        var sf   = c.seniority_fit      || 0;
        var df   = c.domain_fit         || 0;
        cells =
          '<td class="td-rank">' + rank + '</td>' +
          '<td class="td-name">' + nameCell + '</td>' +
          '<td class="td-pos">' + posCell + '</td>' +
          '<td class="td-score"><span class="final-score">' + fs.toFixed(1) + '</span></td>' +
          '<td class="td-score"><span class="score-pill ' + scoreCls(rm) + '">' + rm + '</span></td>' +
          '<td class="td-score"><span class="score-pill ' + scoreCls(sf) + '">' + sf + '</span></td>' +
          '<td class="td-score"><span class="score-pill ' + scoreCls(df) + '">' + df + '</span></td>' +
          '<td class="td-fam">' + famCell + '</td>' +
          '<td class="td-rec">' + recCell + '</td>' +
          '<td class="td-chev">&#8250;</td>';
      } else {
        var loc = '';
        if (c.location) {
          var l = c.location;
          loc = l.city ? l.city + (l.country ? ', ' + l.country : '') : (l.text || l.country || '');
        }
        cells =
          '<td class="td-name">' + nameCell + '</td>' +
          '<td class="td-pos">' + posCell + '</td>' +
          '<td class="td-loc">' + esc(loc) + '</td>' +
          '<td class="td-fam">' + famCell + '</td>' +
          '<td class="td-rec">' + recCell + '</td>' +
          '<td class="td-chev">&#8250;</td>';
      }
      tr.innerHTML = cells;
      frag.appendChild(tr);
    });
    tbody.appendChild(frag);
  }

  // Pager
  var pg = document.getElementById('pager');
  var pages2 = Math.max(1, Math.ceil(total / PAGE_SIZE));
  pg.innerHTML = pages2 <= 1 ? '' :
    '<button class="pg-btn" onclick="goPage('+(currentPage-1)+')"'+(currentPage===1?' disabled':'')+'>&#8592; Prev</button>' +
    '<span class="pg-info">Page ' + currentPage + ' of ' + pages2 + ' &nbsp;·&nbsp; ' + total + ' shown</span>' +
    '<button class="pg-btn" onclick="goPage('+(currentPage+1)+')"'+(currentPage===pages2?' disabled':'')+'>Next &#8594;</button>';

  var all = tab && tab.data ? tab.data.length : 0;
  document.getElementById('vis-count').textContent = total + ' of ' + all;
  updateChips();
}

function goPage(n) { currentPage = n; renderPage(); window.scrollTo(0,0); }

function updateChips() {
  var tab  = tabs[activeIdx];
  var data = tab && tab.data ? tab.data : [];
  var famC = {}, recC = {};
  data.forEach(function(c) {
    var a = getAnn(c.url);
    var f = a.familiarity    || 'not_familiar';
    var r = a.recommendation || 'na';
    famC[f] = (famC[f]||0)+1;
    recC[r] = (recC[r]||0)+1;
  });
  document.querySelectorAll('.ftag[data-dim="fam"][data-v]').forEach(function(btn) {
    var v = btn.dataset.v, chip = btn.querySelector('.count-chip');
    if (chip) chip.remove();
    if (v !== 'all' && famC[v]) {
      var ch = document.createElement('span'); ch.className='count-chip'; ch.textContent=famC[v]; btn.appendChild(ch);
    }
  });
  document.querySelectorAll('.ftag[data-dim="rec"][data-v]').forEach(function(btn) {
    var v = btn.dataset.v, chip = btn.querySelector('.count-chip');
    if (chip) chip.remove();
    if (v !== 'all' && recC[v]) {
      var ch = document.createElement('span'); ch.className='count-chip'; ch.textContent=recC[v]; btn.appendChild(ch);
    }
  });
}

// ── Expand ────────────────────────────────────────────────────────────────────
function closeExpand() {
  if (expandedTr) { expandedTr.remove(); expandedTr = null; }
  if (expandedDataRow) {
    expandedDataRow.classList.remove('expanded');
    var ch = expandedDataRow.querySelector('.td-chev');
    if (ch) ch.textContent = '›';
    expandedDataRow = null;
  }
  expandedUrl = null;
}

function toggleExpand(url, tr, c, type) {
  var wasOpen = (expandedUrl === url);
  closeExpand();
  if (wasOpen) return;

  expandedUrl     = url;
  expandedDataRow = tr;
  tr.classList.add('expanded');
  var chev = tr.querySelector('.td-chev');
  if (chev) chev.textContent = '⌄';

  var a          = getAnn(url);
  var fam        = a.familiarity    || 'not_familiar';
  var rec        = a.recommendation || 'na';
  var allPos     = (c.currentPosition||[]).concat(c.experience||[]).filter(Boolean);
  var notFamiliar= (fam === 'not_familiar');

  var famPills = Object.keys(FAM_LABELS).map(function(v) {
    return '<button class="ann-pill'+(fam===v?' active':'')+'" data-dim="fam" data-v="'+v+
      '" onclick="pickAnn(this,event,\''+url+'\',\'fam\')">'+FAM_LABELS[v]+'</button>';
  }).join('');

  var recPills = Object.keys(REC_LABELS).map(function(v) {
    var dis = (notFamiliar && v !== 'na') ? ' disabled' : '';
    return '<button class="ann-pill'+(rec===v?' active':'')+dis+'" data-dim="rec" data-v="'+v+
      '" onclick="pickAnn(this,event,\''+url+'\',\'rec\')">'+REC_LABELS[v]+'</button>';
  }).join('');

  var scoreSection = '';
  if (type === 'role' && c.final_score != null) {
    scoreSection =
      '<div class="lbl">Score breakdown</div>' +
      '<div class="score-breakdown">' +
        '<div class="score-item"><div class="si-val">'+(c.final_score||0).toFixed(1)+'</div><div class="si-lbl">Final</div></div>' +
        '<div class="score-item"><div class="si-val">'+(c.requirements_match||0)+'</div><div class="si-lbl">Req.</div></div>' +
        '<div class="score-item"><div class="si-val">'+(c.seniority_fit||0)+'</div><div class="si-lbl">Seniority</div></div>' +
        '<div class="score-item"><div class="si-val">'+(c.domain_fit||0)+'</div><div class="si-lbl">Domain</div></div>' +
        '<div class="score-item"><div class="si-val">'+(c.relationship_bonus||0)+'</div><div class="si-lbl">Tenure</div></div>' +
      '</div>' +
      (c.reason ? '<div class="reason-text">'+esc(c.reason)+'</div>' : '');
  }

  var colSpan = (type === 'role') ? '10' : '6';
  var outreach = a.outreach || {};
  var xtr = document.createElement('tr');
  xtr.className = 'expand-row';
  xtr.innerHTML =
    '<td colspan="'+colSpan+'"><div class="expand-panel">' +
      '<div class="ep-col">' +
        '<div class="lbl">Familiarity</div>' +
        '<div class="pill-row" id="fp-'+url+'">'+famPills+'</div>' +
        '<div class="lbl">Recommendation</div>' +
        '<div class="pill-row" id="rp-'+url+'">'+recPills+'</div>' +
        '<div class="lbl">Notes</div>' +
        '<textarea class="notes-box" placeholder="Notes about this person..." oninput="onField(this,\''+url+'\',\'notes\')">'+esc(a.notes||'')+'</textarea>' +
      '</div>' +
      '<div class="ep-col">' +
        (scoreSection ? scoreSection+'<div style="margin-top:6px"></div>' : '') +
        (allPos.length > 2 ? '<div class="lbl">All positions</div><div class="all-pos">'+allPos.map(esc).join('<br>')+'</div>' : '') +
        '<div class="lbl">Outreach</div>' +
        '<div class="outreach-row">' +
          '<label class="outreach-toggle">' +
            '<input type="checkbox"'+(outreach.reached_out?' checked':'')+' onchange="onCheck(this,\''+url+'\')"> Reached out' +
          '</label>' +
          '<input type="date" class="date-input" value="'+esc(outreach.date||'')+'" onchange="onDate(this,\''+url+'\')">' +
        '</div>' +
        '<textarea class="outcome-box" placeholder="Outcome / notes..." oninput="onField(this,\''+url+'\',\'outcome\')">'+esc(outreach.outcome||'')+'</textarea>' +
      '</div>' +
    '</div></td>';

  expandedTr = xtr;
  tr.insertAdjacentElement('afterend', xtr);
}

// ── Annotation handlers ───────────────────────────────────────────────────────
function pickAnn(btn, e, url, dim) {
  e.stopPropagation();
  var v = btn.dataset.v;
  var a = ensureAnn(url);

  if (dim === 'fam') {
    a.familiarity = v;
    if (v === 'not_familiar') {
      a.recommendation = 'na';
      var rpr = document.getElementById('rp-' + url);
      if (rpr) rpr.querySelectorAll('.ann-pill').forEach(function(p) {
        p.classList.toggle('active',   p.dataset.v === 'na');
        p.classList.toggle('disabled', p.dataset.v !== 'na');
      });
      if (expandedDataRow) {
        var rb = expandedDataRow.querySelector('.rec-badge');
        if (rb) { rb.className = 'rec-badge na'; rb.textContent = REC_LABELS['na']; }
      }
    } else {
      var rpr2 = document.getElementById('rp-' + url);
      if (rpr2) rpr2.querySelectorAll('.ann-pill').forEach(function(p) { p.classList.remove('disabled'); });
    }
    if (expandedDataRow) {
      var fb = expandedDataRow.querySelector('.fam-badge');
      if (fb) { fb.className = 'fam-badge ' + v; fb.textContent = FAM_LABELS[v]; }
    }
  } else {
    a.recommendation = v;
    if (expandedDataRow) {
      var rb2 = expandedDataRow.querySelector('.rec-badge');
      if (rb2) { rb2.className = 'rec-badge ' + v; rb2.textContent = REC_LABELS[v]; }
    }
  }

  btn.closest('.pill-row').querySelectorAll('.ann-pill[data-dim="'+dim+'"]').forEach(function(p) {
    p.classList.toggle('active', p.dataset.v === v);
  });
  scheduleSave(); updateChips();
}

function onField(el, url, field) {
  var a = ensureAnn(url);
  if (field === 'notes')   { a.notes = el.value; }
  if (field === 'outcome') { if (!a.outreach) a.outreach={}; a.outreach.outcome = el.value; }
  scheduleSave();
}
function onCheck(el, url) {
  var a = ensureAnn(url); if (!a.outreach) a.outreach={};
  a.outreach.reached_out = el.checked; scheduleSave();
}
function onDate(el, url) {
  var a = ensureAnn(url); if (!a.outreach) a.outreach={};
  a.outreach.date = el.value; scheduleSave();
}

function setFilter(dim, v) {
  if (dim === 'fam') famFilter = v;
  else               recFilter = v;
  currentPage = 1;
  document.querySelectorAll('.ftag[data-dim="'+dim+'"]').forEach(function(b) {
    b.classList.toggle('sel', b.dataset.v === v);
  });
  renderPage();
}

document.getElementById('search').addEventListener('input', function(e) {
  activeSearch = e.target.value; currentPage = 1; renderPage();
});

// ── Badge dropdown (inline annotation) ───────────────────────────────────────
var activeDropdown = null;
var FAM_COLORS = { not_familiar:'#6b7280', somewhat_familiar:'#2563eb', worked_together:'#7c3aed', very_close:'#0891b2' };
var REC_COLORS = { na:'#6b7280', would_not_recommend:'#dc2626', neutral:'#d97706', would_work_with:'#16a34a', strongly_recommend:'#4f46e5' };

function openBadgeDropdown(badge, url, dim) {
  // Toggle if same badge clicked again
  if (activeDropdown && activeDropdown._url === url && activeDropdown._dim === dim) {
    closeDropdown(); return;
  }
  closeDropdown();

  var a          = ensureAnn(url);
  var curVal     = dim === 'fam' ? (a.familiarity || 'not_familiar') : (a.recommendation || 'na');
  var labels     = dim === 'fam' ? FAM_LABELS : REC_LABELS;
  var colors     = dim === 'fam' ? FAM_COLORS : REC_COLORS;
  var locked_rec = (a.familiarity || 'not_familiar') === 'not_familiar';

  var dd = document.createElement('div');
  dd.className = 'badge-dropdown';
  dd._url = url; dd._dim = dim;

  Object.keys(labels).forEach(function(v) {
    var isLocked = (dim === 'rec' && locked_rec && v !== 'na');
    var item = document.createElement('div');
    item.className = 'bdi' + (v === curVal ? ' bdi-active' : '') + (isLocked ? ' bdi-locked' : '');
    var dot = document.createElement('span');
    dot.className = 'bdi-dot'; dot.style.background = colors[v];
    item.appendChild(dot);
    item.appendChild(document.createTextNode(labels[v]));
    if (!isLocked) {
      item.onclick = function(e) {
        e.stopPropagation();
        applyBadgeChange(url, dim, v);
        closeDropdown();
      };
    }
    dd.appendChild(item);
  });

  document.body.appendChild(dd);
  activeDropdown = dd;

  var rect = badge.getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.top  = (rect.bottom + 4) + 'px';

  // Adjust if off right/bottom edge
  requestAnimationFrame(function() {
    if (!activeDropdown) return;
    var dr = dd.getBoundingClientRect();
    if (dr.right  > window.innerWidth  - 8) dd.style.left = Math.max(8, window.innerWidth  - dr.width  - 8) + 'px';
    if (dr.bottom > window.innerHeight - 8) dd.style.top  = (rect.top - dr.height - 4) + 'px';
  });
}

function closeDropdown() {
  if (activeDropdown) { activeDropdown.remove(); activeDropdown = null; }
}

function trByUrl(url) {
  var rows = document.querySelectorAll('tr.data-row');
  for (var i = 0; i < rows.length; i++) {
    if (rows[i].dataset.url === url) return rows[i];
  }
  return null;
}

function applyBadgeChange(url, dim, v) {
  var a = ensureAnn(url);
  if (dim === 'fam') {
    a.familiarity = v;
    if (v === 'not_familiar') a.recommendation = 'na';
  } else {
    a.recommendation = v;
  }

  // Update table row badges
  var tr = trByUrl(url);
  if (tr) {
    if (dim === 'fam') {
      var fb = tr.querySelector('.fam-badge');
      if (fb) { fb.className = 'fam-badge ' + v; fb.textContent = FAM_LABELS[v]; }
      if (v === 'not_familiar') {
        var rb = tr.querySelector('.rec-badge');
        if (rb) { rb.className = 'rec-badge na'; rb.textContent = REC_LABELS['na']; }
      }
    } else {
      var rb2 = tr.querySelector('.rec-badge');
      if (rb2) { rb2.className = 'rec-badge ' + v; rb2.textContent = REC_LABELS[v]; }
    }
  }

  // Sync expand panel pills if open for this row
  if (expandedUrl === url) {
    if (dim === 'fam') {
      var fp = document.getElementById('fp-' + url);
      if (fp) fp.querySelectorAll('.ann-pill').forEach(function(p) { p.classList.toggle('active', p.dataset.v === v); });
      if (v === 'not_familiar') {
        var rp = document.getElementById('rp-' + url);
        if (rp) rp.querySelectorAll('.ann-pill').forEach(function(p) {
          p.classList.toggle('active',   p.dataset.v === 'na');
          p.classList.toggle('disabled', p.dataset.v !== 'na');
        });
      } else {
        var rp2 = document.getElementById('rp-' + url);
        if (rp2) rp2.querySelectorAll('.ann-pill').forEach(function(p) { p.classList.remove('disabled'); });
      }
    } else {
      var rp3 = document.getElementById('rp-' + url);
      if (rp3) rp3.querySelectorAll('.ann-pill').forEach(function(p) { p.classList.toggle('active', p.dataset.v === v); });
    }
  }

  scheduleSave(); updateChips();
}

// ── Inline segmented annotation pick ─────────────────────────────────────────
function segPick(url, dim, v) {
  var a = ensureAnn(url);
  if (dim === 'fam') {
    a.familiarity = v;
    if (v === 'not_familiar') a.recommendation = 'na';
  } else {
    a.recommendation = v;
  }
  // Refresh just the seg buttons in this row without re-rendering the whole page
  var tr = trByUrl(url);
  if (tr) {
    var notFam = (a.familiarity || 'not_familiar') === 'not_familiar';
    tr.querySelectorAll('.ann-seg-btn').forEach(function(btn) {
      var isFam = btn.classList.contains('fam-' + btn.className.match(/fam-(\S+)/)?.[1]);
      var btnDim = btn.className.match(/\b(fam|rec)-(\S+?)\b/) ? btn.className.match(/\b(fam|rec)-(\S+?)\b/)[1] : null;
      var btnVal = btn.className.match(/\b(?:fam|rec)-([^\s]+)/)?.[1];
      if (!btnDim || !btnVal) return;
      if (btnDim === 'fam') {
        btn.classList.toggle('active', btnVal === a.familiarity);
      } else {
        var locked = notFam && btnVal !== 'na';
        btn.classList.toggle('active',      btnVal === a.recommendation && !notFam || (notFam && btnVal === 'na'));
        btn.classList.toggle('ann-seg-locked', locked);
        if (locked) btn.removeAttribute('onclick');
        else btn.setAttribute('onclick', "event.stopPropagation();segPick('" + url + "','rec','" + btnVal + "')");
      }
    });
    // Also sync expand panel if open
    if (expandedUrl === url) {
      if (dim === 'fam') {
        var fp = document.getElementById('fp-' + url);
        if (fp) fp.querySelectorAll('.ann-pill').forEach(function(p) { p.classList.toggle('active', p.dataset.v === v); });
        var rp = document.getElementById('rp-' + url);
        if (rp) rp.querySelectorAll('.ann-pill').forEach(function(p) {
          p.classList.toggle('active',   p.dataset.v === (notFam ? 'na' : a.recommendation));
          p.classList.toggle('disabled', notFam && p.dataset.v !== 'na');
        });
      } else {
        var rp2 = document.getElementById('rp-' + url);
        if (rp2) rp2.querySelectorAll('.ann-pill').forEach(function(p) { p.classList.toggle('active', p.dataset.v === v); });
      }
    }
  }
  scheduleSave(); updateChips();
}

// Close dropdown on outside click
document.addEventListener('click', function() { closeDropdown(); });

// ── Table click delegation (row expand + badge dropdown) ─────────────────────
document.getElementById('tbody').addEventListener('click', function(e) {
  // Badge click → dropdown
  var badge = e.target.closest('.fam-badge, .rec-badge');
  if (badge) {
    e.stopPropagation();
    var btr = badge.closest('tr.data-row');
    if (!btr) return;
    openBadgeDropdown(badge, btr.dataset.url, badge.classList.contains('fam-badge') ? 'fam' : 'rec');
    return;
  }

  // Link click → navigate, don't expand
  if (e.target.closest('a')) return;

  // Row click → expand/collapse
  var tr = e.target.closest('tr.data-row');
  if (!tr) return;
  var url = tr.dataset.url;
  var tab = tabs[activeIdx];
  if (!tab || !tab.data) return;
  var c = null;
  for (var i = 0; i < tab.data.length; i++) {
    if (tab.data[i].url === url) { c = tab.data[i]; break; }
  }
  if (c) toggleExpand(url, tr, c, tab.type);
});

// ── Save ──────────────────────────────────────────────────────────────────────
function scheduleSave() {
  setStatus('Saving…', 'saving');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(doSave, 600);
}
function doSave() {
  fetch('/annotations', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(ann)
  })
  .then(function()  { setStatus('Saved ✓', 'saved'); })
  .catch(function() { setStatus('Save failed', 'error'); });
}
</script>
